                                        <!-- Sexta práctica: Caja de comentarios (Simple Comment Box)


Problema: Crear una caja de comentarios donde los usuarios puedan escribir y agregar comentarios que se muestran en la página. 
Este proyecto ayudará a los estudiantes a manejar eventos de formularios y modificar el contenido de una página.

Instrucciones:
1. Crear un formulario con un campo de texto para el comentario y un botón para enviar.
2. Cuando el usuario haga clic en el botón, el comentario debe aparecer en la página debajo del formulario.
3. Los estudiantes pueden agregar un botón para eliminar comentarios si lo desean.
4. Los comentarios deben aparecer junto con la fecha y hora de publicación. (opcional) -->

<!-- Solución: -->

<!--Paso 1: Creamos la pagina HTML-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caja de comentarios (Simple Comment Box)</title>
</head>
<body>

    <!-- Paso 2: Creamos el formulario para agregar comentarios -->
    <h1>Caja de comentarios</h1>
    <form id="cajaComentarios">
        <fieldset>
            <legend>Datos personales</legend>
            <input type="text" id="nombre" placeholder="Nombre">
            <input type="text" id="apellido" placeholder="Apellido">

            <legend>Comentario</legend>
            <input type="text" id="comentario" placeholder="Escribe tu comentario aquí">
            <button type="submit" id="boton">Agregar comentario</button>
        </fieldset>
    </form>
    
    <!-- Paso 3: Creamos un contenedor para mostrar los comentarios -->
    <div id="comentarios"></div>

    <!-- Paso 4: Agregamos el script para manejar el evento de envío del formulario -->
    <script>

        // Seleccionamos el formulario y el contenedor de comentarios
        let formulario = document.getElementById('cajaComentarios');
        let contenedorComentarios = document.getElementById('comentarios');

        // Agregamos un evento de escucha para el envío del formulario
        formulario.addEventListener('submit', function(event) {
            event.preventDefault(); // Con este metodo evitamos que la página se recargue al enviar el formulario

            // Obtenemos los valores de los campos de texto
            let nombre = document.getElementById('nombre').value;
            let apellido = document.getElementById('apellido').value;
            let comentario = document.getElementById('comentario').value;
            let fecha = new Date(); // Obtenemos la fecha y hora actual
            let fechaFormateada = fecha.toLocaleString("es-MX"); // Formateamos la fecha y hora para mostrarla en español

            // Creamos un nuevo elemento contenedor del comentario
            let nuevoComentario = document.createElement('div');
            nuevoComentario.style.borderBottom = "1px solid #ccc"; // Agregamos un estilo para separar los comentarios
            nuevoComentario.style.marginBottom = "10px"; // Agregamos un margen inferior para separar los comentarios

            //Insertamos el texto y el boton de eliminar comentario
            nuevoComentario.innerHTML = `
            <strong>${nombre} ${apellido}</strong> (${fechaFormateada}) 
            <p>${comentario}</p>
            <button class="btn-eliminar">Eliminar comentario</button>
            `;

            //Buscamos el boton de eliminar comentario y le agregamos un evento de escucha para eliminar el comentario al hacer clic
            let botonEliminar = nuevoComentario.querySelector('.btn-eliminar');
            botonEliminar.addEventListener('click', eliminarComentario);

            //Agregamos el nuevo comentario al contenedor de comentarios
            contenedorComentarios.appendChild(nuevoComentario);

            // Limpiamos los campos del formulario después de agregar el comentario
            formulario.reset();
        });

        // Paso 6: Funcion para eliminar un comentario
        function eliminarComentario(event) {

            let comentario_borrar = event.target.parentElement; // Obtenemos el elemento del comentario
            comentario_borrar.remove(); // Eliminamos el comentario del contenedor
        }
            
    </script>
</body>
</html>
