<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Contraseñas Seguras</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="img/png" href="https://www.svgrepo.com/show/381143/password-account-security-reset-safety.svg">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
    <div id="main-container">

        <h1>Generador de Contraseñas</h1>

        <div class="password-generada">
            <!--Password generada-->
            <input type="text" id="password" placeholder="P4$5W0rD!" readonly>
            <button class="copy-btn"> 
                <span class="material-symbols-outlined">file_copy</span>
            </button>
        </div>

        <div class="opciones">

            <div class="longitud">
                <div class="text">
                    <label id="length-title">Longitud de caracteres</label>
                    <label id="length-label">0</label>
                </div>
                <input type="range" id="length" min="0" max="20" value="0">
            </div>

            <form class="form">
                <div class="checkbox-group">
                    <input type="checkbox" id="uppercase"> 
                    <label for="uppercase">Incluir letras mayúsculas</label>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="lowercase"> 
                    <label for="lowercase">Incluir letras minúsculas</label>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="numbers"> 
                    <label for="numbers">Incluir números</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="symbols"> 
                    <label for="symbols">Incluir símbolos</label>
                </div>

            </form>

            <div class="strength-meter">
                <span class="strength-text">FUERZA: </span>

                <div class="strength-rating">
                    <span id="strength-level"></span>

                    <div class="barra-container">
                        <div class="barra"></div>
                        <div class="barra"></div>
                        <div class="barra"></div>
                        <div class="barra"></div>
                    </div>

                </div>
                
            </div>

        </div>

        <button type="submit" class="generate-btn">Generar Contraseña</button>

    </div>


<script src="script.js"></script>
</body>
</html>
